<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>YTM Widget</title>
  <style>
    /* 基礎樣式 */
    html, body {
    background-color: transparent !important;
    background: rgba(0, 0, 0, 0) !important;
    font-family: sans-serif;
    user-select: none;
    color: white;
    
    margin: 0;
    padding: 0;
    overflow: hidden !important; 
}
    .player-container {
        width: 320px; height: 160px; background-color: #1a1a1a; 
        border-radius: 12px; padding: 10px 15px; box-sizing: border-box;
        display: flex; flex-direction: column; justify-content: space-between;
        box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        
    }

    /* 💡 獨立的拖曳區與控制按鈕 */
    .title-bar {
        display: flex; justify-content: space-between; align-items: center;
        height: 24px; cursor: grab; margin-bottom: 5px;
    }
    .title-bar:active { cursor: grabbing; }
    .drag-text { flex-grow: 1; font-size: 12px; color: #888; font-weight: bold; letter-spacing: 1px;}
    
    .window-controls { display: flex; gap: 8px; -webkit-app-region: no-drag; /* 確保按鈕不會變成拖曳區 */ }
    .ctrl-btn { background: none; border: none; color: #aaa; cursor: pointer; font-size: 14px; padding: 0; transition: 0.2s;}
    .ctrl-btn:hover { color: white; }
    .pin-active { color: #ff4444 !important; /* 釘選啟動時變成紅色 */ }

    /* 資訊行、進度條、控制鍵 (同前一版，簡單列出) */
    /* 修改為上下排列，並確保文字過長時顯示點點點 (...) */
    .row-info { display: flex; flex-direction: column; align-items: flex-start; justify-content: center; overflow: hidden; white-space: nowrap; margin-bottom: 5px; width: 100%; }
    .song-title { font-size: 15px; font-weight: bold; margin: 0; text-overflow: ellipsis; overflow: hidden; width: 100%; }
    .song-artist { font-size: 12px; color: #aaa; margin: 3px 0 0 0; text-overflow: ellipsis; overflow: hidden; width: 100%; }
    
    /* 透明度滑桿的專屬樣式 */
    #opacity-slider { width: 60px; height: 4px; margin-right: 8px; margin-top: 8px; cursor: pointer; accent-color: #888; }
    .row-progress { display: flex; align-items: center; font-size: 11px; color: #aaa; }
    input[type="range"] { flex-grow: 1; margin: 0 10px; cursor: pointer; accent-color: #ff0000; height: 4px; }
    .row-controls { display: flex; justify-content: space-between; align-items: center; }
    .play-controls button { background: none; border: none; cursor: pointer; color: white; font-size: 20px;}
    .volume-controls { display: flex; align-items: center; gap: 5px; }
    #volume-bar { width: 60px; }
  </style>
</head>
<body>
  <div class="player-container">
    
    <div class="title-bar" data-tauri-drag-region>
        <div class="drag-text" data-tauri-drag-region>🎵 YTM WIDGET</div>
        <div class="window-controls">
            <input type="range" id="opacity-slider" min="0.1" max="1" step="0.05" value="1" title="調整面板透明度">
            <button id="show-ytm-btn" class="ctrl-btn" title="顯示/隱藏 YTM">🌐</button>
            <button id="pin-btn" class="ctrl-btn pin-active" title="切換永遠置頂">📌</button>
            <!-- <button id="min-btn" class="ctrl-btn" title="縮小至系統列">🗕</button> -->
            <button id="close-btn" class="ctrl-btn" title="隱藏面板">✖</button>
        </div>
    </div>

    <div class="row-info">
        <h3 id="song-title" class="song-title">連線中...</h3>
        <span id="song-artist" class="song-artist">- 請稍候</span>
    </div>

    <div class="row-progress">
        <span id="current-time">0:00</span>
        <input type="range" id="progress-bar" min="0" max="100" value="0" step="1">
        <span id="duration">0:00</span>
    </div>

    <div class="row-controls">
        <div class="play-controls">
            <button id="prev-btn">⏮️</button>
            <button id="play-pause-btn" style="font-size: 28px;">⏯️</button>
            <button id="next-btn">⏭️</button>
        </div>
        <div class="window-controls">
            <button id="download-btn" class="ctrl-btn" title="下載當前歌曲">📥</button>
        </div>
        <div class="volume-controls">
            <span>🔊</span>
            <input type="range" id="volume-bar" min="0" max="1" value="0.5" step="0.05">
        </div>
    </div>

  </div>
  <script type="module" src="./main.js"></script>
</body>
</html>
